<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>구글 로그인 페이지</title>
    <link rel="stylesheet" href="css/google_login1.css">
</head>
<body>
    <!-- 전체 로그인박스 -->
    <div class="login-box">
        <!--구글 로그인 버튼 -->
        <div class="google-btn">
            <!-- 구글 로고 -->
             <p class="google-logo"><img src="images/google.png" alt="구글로고"></p>
             <!-- 로그인 메세지 -->
              <p class="login-text">Log in with Google</p>
        </div>
        <!-- 가운데 or 글자 -->
         <p class="or-text">or</p>
         <!-- 입력폼 -->
          <form class="form-wrap">
            <!-- 아이디 입력창 -->
             <input type="text" placeholder="Username">

             <!-- 비밀번호 입력창 -->
            <input type="password" placeholder="Password">
            <!-- 로그인 버튼 -->
             <button class="login-btn">LOGIN</button>
          </form>
          <!-- 비밀번호 찾기 -->
           <p class="Forgot">Forgot your password?</p>
    </div>
</body>
</html>
